<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chat</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --brand: #14171f;
      --brand-text: #ffffff;
      --surface: #ffffff;
      --surface-muted: #F0EEE9;
      --border: #e9e4d8;
      --text: #1c1f27;
      --muted: #8b8775;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      height: 100%;
      background-color: transparent !important;
      color-scheme: light dark;
      font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    .hidden {
      display: none !important;
    }

    /* ---------- Bubble (closed state) ---------- */
    #bubble {
      width: 68px;
      height: 68px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--brand);
      border-radius: 50%;
      cursor: pointer;
      box-shadow: 0 8px 24px rgba(20, 23, 31, 0.28), 0 2px 6px rgba(20, 23, 31, 0.15);
      border: none;
      position: absolute;
      bottom: 0;
      right: 0;
      transition: transform 0.18s ease, box-shadow 0.18s ease;
    }

    #bubble:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 28px rgba(20, 23, 31, 0.32), 0 2px 6px rgba(20, 23, 31, 0.18);
    }

    #bubble svg {
      width: 28px;
      height: 28px;
      fill: var(--brand-text);
    }

    #unread-dot {
      position: absolute;
      top: 2px;
      right: 2px;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #e2583f;
      border: 2px solid #fff;
    }

    /* ---------- Chat window (open state) ---------- */
    #panel {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      background: var(--surface);
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 20px 50px rgba(20, 23, 31, 0.22);
    }

    #header {
      background: var(--brand);
      color: var(--brand-text);
      padding: 16px 18px;
      display: flex;
      align-items: center;
      gap: 11px;
      flex-shrink: 0;
    }

    #header img {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      object-fit: cover;
      background: #fff;
    }

    #header .name {
      font-weight: 600;
      font-size: 15px;
      letter-spacing: -0.005em;
    }

    #header .status {
      font-size: 12px;
      opacity: 0.72;
      margin-top: 1px;
    }

    #header .spacer {
      flex: 1;
    }

    #close-btn {
      background: transparent;
      border: none;
      color: var(--brand-text);
      cursor: pointer;
      padding: 6px;
      opacity: 0.75;
      line-height: 0;
      transition: opacity 0.15s ease;
    }

    #close-btn:hover {
      opacity: 1;
    }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 18px 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      background: var(--surface-muted);
    }

    .msg-row {
      display: flex;
      animation: msg-in 0.2s ease-out both;
    }

    @keyframes msg-in {
      from {
        opacity: 0;
        transform: translateY(4px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .msg-row.user {
      justify-content: flex-end;
    }

    .bubble-text {
      max-width: 82%;
      padding: 11px 14px;
      border-radius: 15px;
      font-size: 14px;
      line-height: 1.5;
      white-space: pre-wrap;
      word-wrap: break-word;
    }

    .msg-row.assistant .bubble-text {
      background: #ffffff;
      color: var(--text);
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
    }

    .msg-row.user .bubble-text {
      background: var(--brand);
      color: var(--brand-text);
      border-bottom-right-radius: 4px;
    }

    .typing {
      display: flex;
      gap: 4px;
      padding: 13px 15px;
    }

    .typing span {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #c3bfae;
      animation: bounce 1.2s infinite ease-in-out;
    }

    .typing span:nth-child(2) {
      animation-delay: 0.15s;
    }

    .typing span:nth-child(3) {
      animation-delay: 0.3s;
    }

    @keyframes bounce {

      0%,
      60%,
      100% {
        transform: translateY(0);
        opacity: 0.5;
      }

      30% {
        transform: translateY(-4px);
        opacity: 1;
      }
    }

    #handoff-banner {
      margin: 0 16px 12px 16px;
      padding: 11px 13px;
      background: #fdf3e4;
      border: 1px solid #f0d9a8;
      color: #7a5518;
      font-size: 12.5px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    #handoff-banner button {
      background: var(--brand);
      color: var(--brand-text);
      border: none;
      padding: 7px 12px;
      border-radius: 9px;
      font-size: 12px;
      cursor: pointer;
      white-space: nowrap;
      font-weight: 600;
    }

    #lead-form {
      padding: 16px;
      border-top: 1px solid var(--border);
      background: #fff;
    }

    #lead-form p {
      margin: 0 0 10px 0;
      font-size: 13px;
      color: #5b5748;
    }

    #lead-form input,
    #lead-form textarea {
      width: 100%;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      padding: 9px 11px;
      font-size: 13.5px;
      margin-bottom: 9px;
      font-family: inherit;
      transition: border-color 0.15s ease;
    }

    #lead-form input:focus,
    #lead-form textarea:focus {
      outline: none;
      border-color: var(--brand);
    }

    #lead-form .row {
      display: flex;
      gap: 9px;
    }

    #lead-form button.submit {
      background: var(--brand);
      color: var(--brand-text);
      border: none;
      padding: 9px 16px;
      border-radius: 10px;
      font-size: 13px;
      cursor: pointer;
      font-weight: 600;
    }

    #lead-form button.cancel {
      background: transparent;
      color: var(--muted);
      border: none;
      padding: 9px 11px;
      font-size: 13px;
      cursor: pointer;
    }

    #input-bar {
      display: flex;
      align-items: flex-end;
      gap: 9px;
      padding: 12px 14px;
      border-top: 1px solid var(--border);
      background: #fff;
      flex-shrink: 0;
    }

    #text-input {
      flex: 1;
      resize: none;
      border: 1.5px solid var(--border);
      border-radius: 22px;
      padding: 11px 16px;
      font-size: 14px;
      font-family: inherit;
      max-height: 90px;
      outline: none;
      transition: border-color 0.15s ease;
    }

    #text-input:focus {
      border-color: var(--brand);
    }

    #send-btn {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: none;
      background: var(--brand);
      color: var(--brand-text);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: opacity 0.15s ease, transform 0.1s ease;
    }

    #send-btn:active {
      transform: scale(0.94);
    }

    #send-btn:disabled {
      opacity: 0.4;
      cursor: default;
    }

    #send-btn svg {
      width: 16px;
      height: 16px;
      fill: currentColor;
    }

    #footer-note {
      text-align: center;
      font-size: 10.5px;
      color: #b7b3a1;
      padding: 7px 0 9px 0;
      background: #fff;
      letter-spacing: 0.01em;
    }

    @media (prefers-reduced-motion: reduce) {
      .msg-row {
        animation: none;
      }

      #bubble {
        transition: none;
      }
    }
  </style>
</head>

<body>

  <button id="bubble" aria-label="Open chat">
    <svg viewBox="0 0 24 24">
      <path
        d="M12 2C6.48 2 2 6.03 2 11c0 2.42 1.09 4.62 2.88 6.24-.16 1.28-.63 2.68-1.28 3.76 1.68-.16 3.34-.68 4.6-1.44C9.34 19.86 10.63 20 12 20c5.52 0 10-4.03 10-9s-4.48-9-10-9z" />
    </svg>
    <span id="unread-dot" class="hidden"></span>
  </button>

  <div id="panel" class="hidden">
    <div id="header">
      <img id="header-logo" class="hidden" alt="" />
      <div>
        <div class="name" id="header-name">Chat</div>
        <div class="status">Typically replies instantly</div>
      </div>
      <div class="spacer"></div>
      <button id="close-btn" aria-label="Close chat">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
          <path
            d="M18.3 5.71a1 1 0 0 0-1.41 0L12 10.59 7.11 5.7A1 1 0 1 0 5.7 7.11L10.59 12 5.7 16.89a1 1 0 1 0 1.41 1.41L12 13.41l4.89 4.89a1 1 0 0 0 1.41-1.41L13.41 12l4.89-4.89a1 1 0 0 0 0-1.4z" />
        </svg>
      </button>
    </div>

    <div id="messages"></div>

    <div id="handoff-banner" class="hidden">
      <span>Want to talk to a real person instead?</span>
      <button id="handoff-btn">Leave details</button>
    </div>

    <div id="lead-form" class="hidden">
      <p>Leave your details and the team will get back to you.</p>
      <input id="lead-name" type="text" placeholder="Your name (optional)" />
      <input id="lead-contact" type="text" placeholder="Email or phone" />
      <textarea id="lead-message" rows="2" placeholder="Anything else to add? (optional)"></textarea>
      <div class="row">
        <button class="submit" id="lead-submit">Send</button>
        <button class="cancel" id="lead-cancel">Cancel</button>
      </div>
    </div>

    <div id="input-bar">
      <textarea id="text-input" rows="1" placeholder="Type a message..."></textarea>
      <button id="send-btn" aria-label="Send">
        <svg viewBox="0 0 24 24">
          <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z" />
        </svg>
      </button>
    </div>
    <div id="footer-note">Powered by AI Support Agent</div>
  </div>

  <script>
    (function () {
      'use strict';

      var params = new URLSearchParams(window.location.search);
      var clientKey = params.get('client');
      var embedOrigin = params.get('origin') || '';
      var API_BASE = window.location.origin;

      if (!clientKey) {
        document.body.innerHTML = '<p style="font:13px sans-serif;padding:16px;color:#900">Missing client key.</p>';
        return;
      }

      var storageKey = 'aisa_conv_' + clientKey;
      var historyKey = 'aisa_hist_' + clientKey;

      var els = {
        bubble: document.getElementById('bubble'),
        unreadDot: document.getElementById('unread-dot'),
        panel: document.getElementById('panel'),
        closeBtn: document.getElementById('close-btn'),
        headerLogo: document.getElementById('header-logo'),
        headerName: document.getElementById('header-name'),
        messages: document.getElementById('messages'),
        handoffBanner: document.getElementById('handoff-banner'),
        handoffBtn: document.getElementById('handoff-btn'),
        leadForm: document.getElementById('lead-form'),
        leadName: document.getElementById('lead-name'),
        leadContact: document.getElementById('lead-contact'),
        leadMessage: document.getElementById('lead-message'),
        leadSubmit: document.getElementById('lead-submit'),
        leadCancel: document.getElementById('lead-cancel'),
        textInput: document.getElementById('text-input'),
        sendBtn: document.getElementById('send-btn'),
      };

      var state = {
        open: false,
        conversationId: sessionStorage.getItem(storageKey) || null,
        sending: false,
        pendingLeadReason: 'handoff',
        config: null,
      };

      function post(msg) {
        window.parent.postMessage(Object.assign({ source: 'ai-support-widget' }, msg), '*');
      }

      function escapeHtml(s) {
        var div = document.createElement('div');
        div.textContent = s;
        return div.innerHTML;
      }

      function saveHistory(list) {
        try { sessionStorage.setItem(historyKey, JSON.stringify(list.slice(-40))); } catch (e) { }
      }
      function loadHistory() {
        try { return JSON.parse(sessionStorage.getItem(historyKey) || '[]'); } catch (e) { return []; }
      }

      function addMessage(role, text, opts) {
        opts = opts || {};
        var row = document.createElement('div');
        row.className = 'msg-row ' + role;
        var bubble = document.createElement('div');
        bubble.className = 'bubble-text';
        bubble.innerHTML = escapeHtml(text).replace(/\n/g, '<br>');
        row.appendChild(bubble);
        els.messages.appendChild(row);
        els.messages.scrollTop = els.messages.scrollHeight;
        if (!opts.skipSave) {
          var hist = loadHistory();
          hist.push({ role: role, text: text });
          saveHistory(hist);
        }
      }

      function showTyping() {
        var row = document.createElement('div');
        row.className = 'msg-row assistant';
        row.id = 'typing-row';
        row.innerHTML = '<div class="bubble-text typing"><span></span><span></span><span></span></div>';
        els.messages.appendChild(row);
        els.messages.scrollTop = els.messages.scrollHeight;
      }
      function hideTyping() {
        var row = document.getElementById('typing-row');
        if (row) row.remove();
      }

      function setOpen(open) {
        state.open = open;
        els.panel.classList.toggle('hidden', !open);
        els.bubble.classList.toggle('hidden', open);
        post({ type: 'resize', open: open });
        if (open) {
          els.unreadDot.classList.add('hidden');
          els.textInput.focus();
        }
      }

      function applyConfig(cfg) {
        state.config = cfg;
        document.documentElement.style.setProperty('--brand', cfg.brandColor || '#4F46E5');
        els.headerName.textContent = cfg.name || 'Chat';
        if (cfg.logoUrl) {
          els.headerLogo.src = cfg.logoUrl;
          els.headerLogo.classList.remove('hidden');
        }
        var position = cfg.widgetPosition === 'bottom-left' ? 'bottom-left' : 'bottom-right';
        post({ type: 'position', position: position, open: state.open });

        var hist = loadHistory();
        if (hist.length === 0) {
          addMessage('assistant', cfg.welcomeMessage || 'Hi! How can I help you today?');
        } else {
          hist.forEach(function (m) { addMessage(m.role, m.text, { skipSave: true }); });
        }
      }

      function loadConfig() {
        fetch(API_BASE + '/api/chat/' + encodeURIComponent(clientKey) + '/config', {
          headers: { 'X-Embed-Origin': embedOrigin },
        })
          .then(function (r) {
            if (!r.ok) throw new Error('config request failed');
            return r.json();
          })
          .then(applyConfig)
          .catch(function () {
            applyConfig({ name: 'Chat', welcomeMessage: 'Hi! How can I help you today?', brandColor: '#14171f', widgetPosition: 'bottom-right' });
          });
      }

      function setSending(sending) {
        state.sending = sending;
        els.sendBtn.disabled = sending || !els.textInput.value.trim();
      }

      function sendMessage(text) {
        addMessage('user', text);
        els.textInput.value = '';
        autoGrow();
        setSending(true);
        showTyping();
        els.handoffBanner.classList.add('hidden');

        fetch(API_BASE + '/api/chat/' + encodeURIComponent(clientKey) + '/message', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'X-Embed-Origin': embedOrigin },
          body: JSON.stringify({ conversationId: state.conversationId, message: text }),
        })
          .then(function (r) {
            return r.json().then(function (data) { return { ok: r.ok, data: data }; });
          })
          .then(function (res) {
            hideTyping();
            setSending(false);
            if (!res.ok) {
              addMessage('assistant', res.data.error || 'Something went wrong. Please try again.', { skipSave: true });
              return;
            }
            var data = res.data;
            if (data.conversationId) {
              state.conversationId = data.conversationId;
              sessionStorage.setItem(storageKey, data.conversationId);
            }
            addMessage('assistant', data.reply);
            if (data.offerHandoff) {
              state.pendingLeadReason = data.quotaExceeded ? 'handoff' : 'low_confidence';
              els.handoffBanner.classList.remove('hidden');
            }
            if (!state.open) {
              els.unreadDot.classList.remove('hidden');
            }
          })
          .catch(function () {
            hideTyping();
            setSending(false);
            addMessage('assistant', "Sorry, I couldn't reach the server. Please check your connection and try again.", { skipSave: true });
          });
      }

      function submitLead() {
        var contact = els.leadContact.value.trim();
        if (!contact) {
          els.leadContact.style.borderColor = '#ef4444';
          els.leadContact.focus();
          return;
        }
        fetch(API_BASE + '/api/chat/' + encodeURIComponent(clientKey) + '/lead', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'X-Embed-Origin': embedOrigin },
          body: JSON.stringify({
            conversationId: state.conversationId,
            name: els.leadName.value.trim() || null,
            contact: contact,
            message: els.leadMessage.value.trim() || null,
            reason: state.pendingLeadReason,
          }),
        })
          .then(function (r) { return r.json(); })
          .then(function () {
            els.leadForm.classList.add('hidden');
            addMessage('assistant', "Thanks — you're all set. The team will reach out shortly.", { skipSave: true });
          })
          .catch(function () {
            addMessage('assistant', "That didn't go through — please try again in a moment.", { skipSave: true });
          });
      }

      function autoGrow() {
        els.textInput.style.height = 'auto';
        els.textInput.style.height = Math.min(90, els.textInput.scrollHeight) + 'px';
        els.sendBtn.disabled = state.sending || !els.textInput.value.trim();
      }

      els.bubble.addEventListener('click', function () { setOpen(true); });
      els.closeBtn.addEventListener('click', function () { setOpen(false); });

      // Lets the parent page trigger the widget open — used by the marketing
      // landing page's "Talk to the demo bot" button. Harmless no-op for normal
      // client embeds, since only intentional postMessage calls reach it.
      window.addEventListener('message', function (event) {
        var data = event.data;
        if (data && data.type === 'ai-support-agent:open') setOpen(true);
      });

      els.textInput.addEventListener('input', autoGrow);
      els.textInput.addEventListener('keydown', function (e) {
        if (e.key === 'Enter' && !e.shiftKey) {
          e.preventDefault();
          var text = els.textInput.value.trim();
          if (text && !state.sending) sendMessage(text);
        }
      });
      els.sendBtn.addEventListener('click', function () {
        var text = els.textInput.value.trim();
        if (text && !state.sending) sendMessage(text);
      });

      els.handoffBtn.addEventListener('click', function () {
        els.leadForm.classList.remove('hidden');
        els.handoffBanner.classList.add('hidden');
      });
      els.leadCancel.addEventListener('click', function () { els.leadForm.classList.add('hidden'); });
      els.leadSubmit.addEventListener('click', submitLead);

      setSending(false);
      loadConfig();
    })();
  </script>
</body>

</html>
